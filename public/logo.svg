<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <!-- Navy blue background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0c1438"/>
      <stop offset="50%"  stop-color="#0e1842"/>
      <stop offset="100%" stop-color="#121e50"/>
    </linearGradient>
    <!-- Main gold gradient -->
    <linearGradient id="g1" x1="100" y1="20" x2="300" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fff8c8"/>
      <stop offset="18%"  stop-color="#f7dd70"/>
      <stop offset="45%"  stop-color="#d4a017"/>
      <stop offset="75%"  stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#7a5800"/>
    </linearGradient>
    <!-- Shiny highlight gradient for 3D feel -->
    <linearGradient id="g2" x1="100" y1="0" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffe680"/>
      <stop offset="40%"  stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#c8900a"/>
    </linearGradient>
    <!-- Subtle gold glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Text gradient -->
    <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff5b0"/>
      <stop offset="30%"  stop-color="#f5d060"/>
      <stop offset="65%"  stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#a07010"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="480" fill="url(#bg)"/>
  <!-- Subtle radial glow in center -->
  <radialGradient id="centerGlow" cx="50%" cy="42%" r="40%">
    <stop offset="0%"  stop-color="#1a2560" stop-opacity="1"/>
    <stop offset="100%" stop-color="#0c1438" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="480" fill="url(#centerGlow)"/>

  <!-- ══════════════════════════════ ICON ══════════════════════════════ -->
  <!-- Outer rounded rectangle frame -->
  <rect x="105" y="24" width="190" height="208" rx="46" ry="46"
    stroke="url(#g1)" stroke-width="8" fill="none" filter="url(#glow)"/>

  <!-- Clock arc (upper portion, top half of circle) -->
  <path d="M 140 120 A 60 60 0 0 1 260 120"
    stroke="url(#g1)" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Clock tick 12 o'clock -->
  <line x1="200" y1="42" x2="200" y2="56"
    stroke="url(#g1)" stroke-width="6" stroke-linecap="round"/>

  <!-- Clock tick 9 (left) -->
  <line x1="138" y1="118" x2="152" y2="118"
    stroke="url(#g1)" stroke-width="5" stroke-linecap="round"/>

  <!-- Clock tick 3 (right) -->
  <line x1="262" y1="118" x2="248" y2="118"
    stroke="url(#g1)" stroke-width="5" stroke-linecap="round"/>

  <!-- Clock hands — 10:10 -->
  <line x1="200" y1="118" x2="175" y2="93"
    stroke="url(#g1)" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="118" x2="222" y2="96"
    stroke="url(#g2)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="200" cy="118" r="7" fill="url(#g1)"/>
  <circle cx="200" cy="118" r="3" fill="#0c1438"/>

  <!-- Scissors blade 1 — lower-left to upper-right -->
  <line x1="138" y1="220" x2="262" y2="56"
    stroke="url(#g1)" stroke-width="11" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Scissors blade 2 — lower-right to upper-left -->
  <line x1="262" y1="220" x2="138" y2="56"
    stroke="url(#g1)" stroke-width="11" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Pivot screw -->
  <circle cx="200" cy="138" r="12" fill="url(#g1)"/>
  <circle cx="200" cy="138" r="5.5" fill="#0c1438"/>

  <!-- Left handle ring -->
  <circle cx="138" cy="222" r="20" stroke="url(#g1)" stroke-width="8" fill="none" filter="url(#glow)"/>

  <!-- Right handle ring -->
  <circle cx="262" cy="222" r="20" stroke="url(#g1)" stroke-width="8" fill="none" filter="url(#glow)"/>

  <!-- Location pin between rings -->
  <path d="M 200 210 C 194 205 188 198 188 192.5 A 12 12 0 0 1 212 192.5 C 212 198 206 205 200 210 Z"
    fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="200" cy="192.5" r="5" fill="#0c1438"/>

  <!-- ══════════════════════════════ TEXT ══════════════════════════════ -->

  <!-- DORK main text -->
  <text x="200" y="332"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="88"
    font-weight="900"
    text-anchor="middle"
    fill="url(#tg)"
    letter-spacing="8"
    filter="url(#glow)">DORK</text>

  <!-- Decorative line left -->
  <line x1="80" y1="364" x2="155" y2="364"
    stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Decorative line right -->
  <line x1="245" y1="364" x2="320" y2="364"
    stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- SALON BOOKING subtitle -->
  <text x="200" y="361"
    font-family="Arial, Helvetica, sans-serif"
    font-size="17"
    font-weight="600"
    text-anchor="middle"
    fill="#c8900a"
    letter-spacing="4">SALON BOOKING</text>
</svg>
