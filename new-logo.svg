<svg width="200" height="40" viewBox="0 0 500 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7e7b7"/>
      <stop offset="25%" stop-color="#e6c980"/>
      <stop offset="50%" stop-color="#d4b15f"/>
      <stop offset="75%" stop-color="#f1d99c"/>
      <stop offset="100%" stop-color="#c9a24a"/>
    </linearGradient>
  </defs>

  <!-- Clock: upper semicircle arc (center 52,40 radius 28) -->
  <path d="M24 40 A28 28 0 0 1 80 40" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <!-- Clock hands: 10:10 position -->
  <line x1="52" y1="40" x2="40" y2="17" stroke="url(#gold)" stroke-width="4"   stroke-linecap="round"/>
  <line x1="52" y1="40" x2="67" y2="24" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Clock centre dot -->
  <circle cx="52" cy="40" r="2.5" fill="url(#gold)"/>

  <!-- Scissors blades (X crossing, pivot at 51.5,68) -->
  <line x1="35" y1="90" x2="68" y2="46" stroke="url(#gold)" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="68" y1="90" x2="35" y2="46" stroke="url(#gold)" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Handle rings -->
  <circle cx="35" cy="90" r="8.5" fill="none" stroke="url(#gold)" stroke-width="3.5"/>
  <circle cx="68" cy="90" r="8.5" fill="none" stroke="url(#gold)" stroke-width="3.5"/>
  <!-- Pivot screw -->
  <circle cx="51.5" cy="68" r="4"   fill="url(#gold)"/>
  <circle cx="51.5" cy="68" r="1.8" fill="#0d0d1a"/>

  <!-- Vertical divider -->
  <line x1="100" y1="10" x2="100" y2="90" stroke="url(#gold)" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- DORK -->
  <text x="300" y="62" text-anchor="middle"
        font-family="Georgia, serif" font-size="66"
        fill="url(#gold)" font-weight="700">DORK</text>

  <!-- SALON BOOKING -->
  <text x="300" y="84" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="18"
        fill="url(#gold)" letter-spacing="3">SALON BOOKING</text>
</svg>
